const MONTHS = ['一月','二月','三月','四月','五月','六月','七月','八月','九月','十月','十一月','十二月'];

function dateKey(y, m, d) {
  return `${y}${String(m+1).padStart(2,'0')}${String(d).padStart(2,'0')}`;
}

function dayOfWeekMon(y, m, d) {
  const dow = new Date(y, m, d).getDay();
  return dow === 0 ? 6 : dow - 1; // Mon=0 ... Sun=6
}

function daysInMonth(y, m) {
  return new Date(y, m + 1, 0).getDate();
}

const today = new Date();
let curYear = 2026, curMonth = 4; // May 2026 (0-indexed)

function dayNum(fname) {
  const m = fname.match(/Day(\d+)/);
  return m ? parseInt(m[1]) : '';
}

function render() {
  document.getElementById('month-title').textContent = `${curYear}年 ${MONTHS[curMonth]}`;
  const daysEl = document.getElementById('days');
  daysEl.innerHTML = '';

  const firstDow = dayOfWeekMon(curYear, curMonth, 1);
  const total = daysInMonth(curYear, curMonth);

  // Empty cells before 1st
  for (let i = 0; i < firstDow; i++) {
    const el = document.createElement('div');
    el.className = 'day empty';
    daysEl.appendChild(el);
  }

  for (let d = 1; d <= total; d++) {
    const key = dateKey(curYear, curMonth, d);
    const data = FILES[key];
    const isToday = (curYear === today.getFullYear() && curMonth === today.getMonth() && d === today.getDate());

    const el = document.createElement('div');
    el.className = 'day' + (isToday ? ' today' : '') + (data ? ' has-content' : '');

    const num = document.createElement('div');
    num.className = 'date-num';
    num.textContent = d;
    el.appendChild(num);

    if (data) {
      const links = document.createElement('div');
      links.className = 'links';
      ['Amy', 'Mia'].forEach(person => {
        if (data[person]) {
          const a = document.createElement('a');
          a.className = 'link-btn ' + person.toLowerCase();
          a.href = data[person];
          a.target = '_blank';
          const n = dayNum(data[person]);
          a.innerHTML = `<span class="icon">📖</span>${person} <span class="day-label">D${n}</span>`;
          links.appendChild(a);
        }
      });
      el.appendChild(links);
    }

    daysEl.appendChild(el);
  }
}

document.getElementById('prev').onclick = () => {
  curMonth--;
  if (curMonth < 0) { curMonth = 11; curYear--; }
  render();
};
document.getElementById('next').onclick = () => {
  curMonth++;
  if (curMonth > 11) { curMonth = 0; curYear++; }
  render();
};

render();
</script>
